# SRTLA Compatibility Matrix Registry
# Single source of truth for compat test pairs.
# Pin refresh policy: manual refresh; weekly drift job tests upstream HEAD non-blocking.

senders:
  - name: belabox-srtla-send
    repo: https://github.com/BELABOX/srtla
    pin: 6f3925eb85b0ce75d3b28e65b12e88baed222f71
    role: sender
    build: docker/belabox-sender/Dockerfile
    tier: blocking
    notes: >-
      BELABOX reference sender, pinned to the *oldest srtla2* commit
      ("srtla2: now with receiver support for multiple connections",
      2021-02-04) — the first BELABOX revision that speaks the REG1/REG2/REG3
      handshake. This is deliberately the earliest interoperable srtla2 build so
      the blocking tier proves our modern srtla_rec still accepts a 4-year-old
      field sender (maximum backward-compat surface). Do NOT move this back to
      pre-2021-02-04 SHAs: those are srtla1 (keepalive/ack only, no registration)
      — a different, superseded protocol generation we intentionally do not
      support. See docs/COMPATIBILITY.md.

  - name: irlserver-srtla-send
    repo: https://github.com/irlserver/srtla_send
    pin: ef95926918d8a4a87579c13c19a3d38dde4ca381
    role: sender
    build: docker/irlserver-srtla-send/Dockerfile
    tier: blocking
    notes: "irlserver Rust sender; tag v3.0.0"

  - name: ceralive-srtla-send-rs
    repo: https://github.com/CERALIVE/srtla-send-rs
    pin: b867c7daa3bd1192bdf762f55e6f0c99ceb66763
    role: sender
    # Deliberately no `build:` key — this pair runs a pre-built release binary,
    # not a docker-built source pin; gen-ci-matrix.sh --images skips it by design.
    release: v1.0.0
    fetch: release-deb
    env_override: SRTLA_SEND_RS_BIN
    artifacts:
      amd64:
        file: srtla-send-rs_3.0.0_amd64.deb
        sha256: 803f0ed4a8964d813a78e16cf2a1b84027fea6efc0273690b2cfa6a60a457dc5
      arm64:
        file: srtla-send-rs_3.0.0_arm64.deb
        sha256: 305f117539cf170ecf52cfef303e39de0c5c44c2e0933803636f7d5cfd27352f
    tier: blocking
    notes: >-
      CERALIVE fork of the irlserver Rust srtla_send, adopted as the shipping
      sender via direct cutover (ADR-003). Pinned to the v1.0.0 release tag
      (commit b867c7d); the .deb package Version is 3.0.0, inherited from the
      upstream Cargo.toml, so pin by SHA/commit, not version. Fetch with:
        gh release download v1.0.0 -R CERALIVE/srtla-send-rs --pattern "*<arch>*.deb"
      verify the SHA256 above, then `dpkg-deb -x` (or `ar` + `tar --zstd`) to
      obtain /usr/bin/srtla_send. The CLI is positional-compatible with the C
      sender (SRT_LISTEN_PORT SRTLA_HOST SRTLA_PORT IPS_FILE). The receiver
      stays the C srtla_rec (ADR-002) — this pair is the ADR-003 sender cutover
      gate. See docs/adr/ADR-003-rust-sender-adoption.md.

  - name: moblin-mock
    repo: https://github.com/eerimoq/moblin
    pin: 0ae5294950166978064840bc874bfed3a8cf03a4
    role: sender
    build: tests/compat/moblin-mock/
    tier: blocking
    notes: "Conformance mock (C++/Python); no Swift compilation"

receivers:
  - name: belabox-srtla-rec
    repo: https://github.com/BELABOX/srtla
    pin: 6f3925eb85b0ce75d3b28e65b12e88baed222f71
    role: receiver
    build: docker/belabox-receiver/Dockerfile
    tier: blocking
    notes: >-
      BELABOX reference receiver; same repo and same oldest-srtla2 pin as the
      sender entry (2021-02-04). Tests that our modern srtla_send still registers
      against the earliest srtla2 receiver. Pre-2021-02-04 SHAs are srtla1 and
      out of scope — see the belabox-srtla-send note and docs/COMPATIBILITY.md.

  - name: openirl-receiver
    repo: https://github.com/OpenIRL/srtla-receiver
    pin: d8fd677812b5706008dd329ba6239429ec5bc51c
    role: receiver
    build: docker/openirl-receiver/Dockerfile
    tier: blocking
    notes: >-
      OpenIRL receiver. The compat image builds only the srtla_rec component
      (the SRTLA->SRT forwarder) from https://github.com/OpenIRL/srtla pinned at
      e9ba6a36ffaf179e92e06c7e3967637959fff363 (OPENIRL_SRTLA_REF build ARG).
      The full OpenIRL management stack (srt-live-server + streamid/apikey auth)
      is intentionally omitted: it cannot forward to a plain SRT sink and so
      does not fit the SRTLA_PORT/SRT_TARGET_HOST/SRT_TARGET_PORT env contract
      the harness uses; protocol compat only exercises the SRTLA path. CLI:
      srtla_rec --srtla_port P --srt_hostname H --srt_port P2. No source patch.

  - name: go-srtla
    repo: https://github.com/e04/go-srtla
    pin: 8a3b55ba562891ddc6d272cb015e136035bbffc8
    role: receiver
    build: docker/go-srtla/Dockerfile
    tier: informational
    notes: "Go implementation"

  - name: go-irl
    repo: https://github.com/e04/go-irl
    pin: fa9c1185182a1f59502e62e9fd6eb0fd8ad8c2d4
    role: receiver
    build: docker/go-irl/Dockerfile
    tier: informational
    notes: >-
      go-irl is a full IRL app (SRTLA receiver + SRT proxy + browser source +
      WebSocket UI). Headless receiver-only invocation:
      ./go-irl -mode=server -srtla-port=5000 -srt-host=127.0.0.1 -srt-port=5001
      -mode=server runs ONLY the SRTLA receiver (runSrtla), no proxy/UI.
      Flags use HYPHENS (go-srtla, a different binary, uses underscores).
      Build-fix (no source patch): go-irl //go:embed's frontend/dist/index.html,
      a vite artifact absent from the repo, so the Docker build stages a
      placeholder to let `go build` succeed; server mode never serves it.

pairs:
  - sender: belabox-srtla-send
    receiver: ours
    tier: blocking

  - sender: irlserver-srtla-send
    receiver: ours
    tier: blocking

  - sender: ceralive-srtla-send-rs
    receiver: ours
    tier: blocking
    notes: "ADR-003 Rust sender cutover gate — fork srtla_send -> C srtla_rec"

  # ADR-003 Rust sender vs the OTHER ecosystem receivers — wire interop beyond our
  # own srtla_rec. All basic healthy-stream pairs (scenario=stream, no netem) so
  # they stay unprivileged (S3: impairment/netem lives only in the privileged job);
  # tier mirrors the matching `ours -> <receiver>` pair. `skip_if_missing: true`
  # tracks the harness' existing auto-SKIP when SRTLA_SEND_RS_BIN is unset or the
  # receiver image is unbuilt — never a hard failure. No standalone irlserver
  # srtla_rec exists here (irlserver is sender-only); go-irl/go-srtla cover Go.
  - sender: ceralive-srtla-send-rs
    receiver: belabox-srtla-rec
    tier: blocking
    skip_if_missing: true
    notes: "Rust fork sender -> oldest-srtla2 BELABOX receiver (backward-compat wire proof)"

  - sender: ceralive-srtla-send-rs
    receiver: openirl-receiver
    tier: blocking
    skip_if_missing: true
    notes: "Rust fork sender -> OpenIRL srtla_rec (SRTLA-path-only image)"

  - sender: moblin-mock
    receiver: ours
    tier: blocking

  - sender: ours
    receiver: belabox-srtla-rec
    tier: blocking

  - sender: ours
    receiver: openirl-receiver
    tier: blocking

  - sender: ours
    receiver: ours
    tier: blocking
    notes: "Extended-KA activation verification"

  - sender: ours
    receiver: go-srtla
    tier: informational

  - sender: ours
    receiver: go-irl
    tier: informational

  # ADR-003 Rust fork sender vs the Go receivers (see the blocking-tier block
  # above for the S3 / skip_if_missing rationale). Informational to match the
  # receivers' own tier and the `ours -> go-*` pairs.
  - sender: ceralive-srtla-send-rs
    receiver: go-srtla
    tier: informational
    skip_if_missing: true
    notes: "Rust fork sender -> go-srtla (minimal Go receiver)"

  - sender: ceralive-srtla-send-rs
    receiver: go-irl
    tier: informational
    skip_if_missing: true
    notes: "Rust fork sender -> go-irl (Go IRL receiver, server mode)"

# End-to-end behavioral scenarios under tests/compat/scenarios/. These are
# standalone scripts (NOT sender/receiver interop pairs): each drives our own
# srtla_send/srtla_rec through a specific failure or stress condition and decides
# its own PASS/FAIL. `requires` names the host capability the script gates on and
# SKIPs cleanly without (exit code in `skip_exit`); `gated_on_disconnects` records
# whether end-to-end SRT `disconnects == 0` is a pass gate (true only when the
# scenario tears down no link — see each script's header).
scenarios:
  - name: receiver-restart
    script: tests/compat/scenarios/receiver-restart.sh
    requires: none
    skip_exit: 3
    gated_on_disconnects: false
    proves: "Sender re-registers within ~5s after receiver SIGKILL+restart."

  - name: link-drop
    script: tests/compat/scenarios/link-drop.sh
    requires: iptables
    skip_exit: 3
    gated_on_disconnects: false
    proves: >-
      Two bonded links; isolating one makes the sender shift off it within
      CONN_TIMEOUT (survivor stays up) and re-register on restore.

  - name: sighup-reload
    script: tests/compat/scenarios/sighup-reload.sh
    requires: none
    skip_exit: 1
    gated_on_disconnects: true
    proves: >-
      A new IP joins the group on SIGHUP with 0 disconnects (no re-handshake);
      a garbage IP file is refused without crashing or dropping links.

  - name: jitter-stress
    script: tests/compat/scenarios/jitter-stress.sh
    requires: netem        # CAP_NET_ADMIN + ip/tc/ping; gated via netem_require
    skip_exit: 77          # SKIP-PRIVILEGED, mirrors netem_require / pcap-replay
    gated_on_disconnects: true
    proves: >-
      Two bonded links under three escalating live netem jitter phases
      (150ms ±50/100/200ms, no loss) keep streaming with strictly-increasing
      per-phase throughput, ZERO receiver link reaps, both links registered, and
      disconnects == 0 — jitter alone must never kill a healthy link
      (stresses RTT_VARIANCE_THRESHOLD=50ms end-to-end).

  - name: reorder-stress
    script: tests/compat/scenarios/reorder-stress.sh
    requires: netem        # CAP_NET_ADMIN + ip/tc; gated via netem_require
    skip_exit: 77          # SKIP-PRIVILEGED, mirrors netem_require / pcap-replay
    gated_on_disconnects: true
    proves: >-
      Cross-link packet reordering — THE core SRTLA stress. Two bonded source
      IPs ride one tc-netem-shaped veth into a private netns hosting
      srtla_rec + srt-sink, shaped with asymmetric per-link delay (50ms/150ms,
      prio+u32 classified per source) plus an explicit `netem reorder 25% 50%
      delay 20ms` phase on the fast link. Gates: handshake, bytes_received >=
      5000 and disconnects == 0 over >= 30s, and the reorder phase provably
      active (non-zero packets through the reorder-configured qdisc). Doubles as
      the srt-patch A/B/C measurement instrument: SINK_LD_LIBRARY_PATH selects
      the receiver libsrt build and SINK_EXTRA_ARGS passes srt-sink flags (e.g.
      --nakreport 0 --lossmaxttl 30); it emits one machine-parseable summary
      line and makes no A/B/C judgement. Unprivileged: exit 77 (SKIP).

  - name: link-drop-high-rtt
    script: tests/compat/scenarios/link-drop-high-rtt.sh
    tier: blocking
    privileged: true
    notes: >-
      Bonded link-drop / shift under 200ms±20ms RTT — netem `delay 200ms 20ms
      distribution normal` applied to BOTH links via tests/compat/lib/netem.sh.
      Two srtla_send source IPs ride one tc-netem-shaped veth into a private
      netns hosting srtla_rec + srt-sink; link1 is isolated mid-stream with
      iptables. Gates: handshake <=10s under 200ms RTT, bytes_received >= 5000,
      and the sender shifts off the dead link within SENDER_CONN_TIMEOUT while
      the survivor keeps delivering. Per tests/KNOWN_BUGS.md (link-drop
      precedent), end-to-end SRT `disconnects` is recorded but is NOT a pass
      gate for the isolation phase. Unprivileged: netem_require exits 77 (SKIP).

