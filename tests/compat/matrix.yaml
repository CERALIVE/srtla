  # receivers' own tier and the `ours -> go-*` pairs.
  - sender: ceralive-srtla-send-rs
    receiver: go-srtla
    tier: informational
    skip_if_missing: true
    notes: "Rust fork sender -> go-srtla (minimal Go receiver)"

  - sender: ceralive-srtla-send-rs
    receiver: go-irl
    tier: informational
    skip_if_missing: true
    notes: "Rust fork sender -> go-irl (Go IRL receiver, server mode)"

# End-to-end behavioral scenarios under tests/compat/scenarios/. These are
# standalone scripts (NOT sender/receiver interop pairs): each drives our own
# srtla_send/srtla_rec through a specific failure or stress condition and decides
# its own PASS/FAIL. `requires` names the host capability the script gates on and
# SKIPs cleanly without (exit code in `skip_exit`); `gated_on_disconnects` records
# whether end-to-end SRT `disconnects == 0` is a pass gate (true only when the
# scenario tears down no link — see each script's header).
scenarios:
  - name: receiver-restart
    script: tests/compat/scenarios/receiver-restart.sh
    requires: none
    skip_exit: 3
    gated_on_disconnects: false
    proves: "Sender re-registers within ~5s after receiver SIGKILL+restart."

  - name: link-drop
    script: tests/compat/scenarios/link-drop.sh
    requires: iptables
    skip_exit: 3
    gated_on_disconnects: false
    proves: >-
      Two bonded links; isolating one makes the sender shift off it within
      CONN_TIMEOUT (survivor stays up) and re-register on restore.

  - name: sighup-reload
    script: tests/compat/scenarios/sighup-reload.sh
    requires: none
    skip_exit: 1
    gated_on_disconnects: true
    proves: >-
      A new IP joins the group on SIGHUP with 0 disconnects (no re-handshake);
      a garbage IP file is refused without crashing or dropping links.

  - name: jitter-stress
    script: tests/compat/scenarios/jitter-stress.sh
    requires: netem        # CAP_NET_ADMIN + ip/tc/ping; gated via netem_require
    skip_exit: 77          # SKIP-PRIVILEGED, mirrors netem_require / pcap-replay
    gated_on_disconnects: true
    proves: >-
      Two bonded links under three escalating live netem jitter phases
      (150ms ±50/100/200ms, no loss) keep streaming with strictly-increasing
      per-phase throughput, ZERO receiver link reaps, both links registered, and
      disconnects == 0 — jitter alone must never kill a healthy link
      (stresses RTT_VARIANCE_THRESHOLD=50ms end-to-end).

  - name: reorder-stress
    script: tests/compat/scenarios/reorder-stress.sh
    requires: netem        # CAP_NET_ADMIN + ip/tc; gated via netem_require
    skip_exit: 77          # SKIP-PRIVILEGED, mirrors netem_require / pcap-replay
    gated_on_disconnects: true
    proves: >-
      Cross-link packet reordering — THE core SRTLA stress. Two bonded source
      IPs ride one tc-netem-shaped veth into a private netns hosting
      srtla_rec + srt-sink, shaped with asymmetric per-link delay (50ms/150ms,
      prio+u32 classified per source) plus an explicit `netem reorder 25% 50%
      delay 20ms` phase on the fast link. Gates: handshake, bytes_received >=
      5000 and disconnects == 0 over >= 30s, and the reorder phase provably
      active (non-zero packets through the reorder-configured qdisc). Doubles as
      the srt-patch A/B/C measurement instrument: SINK_LD_LIBRARY_PATH selects
      the receiver libsrt build and SINK_EXTRA_ARGS passes srt-sink flags (e.g.
      --nakreport 0 --lossmaxttl 30); it emits one machine-parseable summary
      line and makes no A/B/C judgement. Unprivileged: exit 77 (SKIP).

  - name: link-drop-high-rtt
    script: tests/compat/scenarios/link-drop-high-rtt.sh
    tier: blocking
    privileged: true
    notes: >-
      Bonded link-drop / shift under 200ms±20ms RTT — netem `delay 200ms 20ms
      distribution normal` applied to BOTH links via tests/compat/lib/netem.sh.
      Two srtla_send source IPs ride one tc-netem-shaped veth into a private
      netns hosting srtla_rec + srt-sink; link1 is isolated mid-stream with
      iptables. Gates: handshake <=10s under 200ms RTT, bytes_received >= 5000,
      and the sender shifts off the dead link within SENDER_CONN_TIMEOUT while
      the survivor keeps delivering. Per tests/KNOWN_BUGS.md (link-drop
      precedent), end-to-end SRT `disconnects` is recorded but is NOT a pass
      gate for the isolation phase. Unprivileged: netem_require exits 77 (SKIP).

  - name: ts-continuity-loopback
    script: tests/compat/scenarios/ts-continuity-loopback.sh
    requires: srt-live-transmit
    skip_exit: 3
    gated_on_disconnects: false
    proves: >-
      Real-SRT loopback over 127.0.0.1 proving srt-sink's MPEG-TS continuity
      metric is correct AND falsifiable: a clean transport stream sent raw
      yields ts_sync_errors==0 and ts_cc_errors==0, while the SAME TS with one
      payload-bearing packet excised yields ts_cc_errors>0. Raw byte passthrough
      (srt-live-transmit, NOT ffmpeg — which re-muxes the container and would
      heal the injected drop) preserves the continuity break end-to-end; the
      send is paced to ~real time and null-padded to a whole SRT chunk so the
      live socket neither drops nor zero-pads into spurious sync errors.
      Unprivileged; SKIPs (exit 3) without srt-live-transmit. Integration
      companion to the hermetic `ts-continuity` ctest (same proof, no network).

  - name: fec-connect-matrix
    script: tests/compat/scenarios/fec-connect-matrix.sh
    requires: srt-live-transmit
    skip_exit: 3
    gated_on_disconnects: false
    proves: >-
      SRT one-sided packet-filter (FEC) connect negotiation against a single
      fec-accept listener (srt-sink --packetfilter fec), the receiver profile
      (L1) that device FEC senders ride. Reads the negotiated SRTO_PACKETFILTER
      off the accepted socket from srt-sink's result JSON. (a) a full-config FEC
      caller negotiates FEC: the accepted socket reports a non-empty merged
      config and bytes flow. (b) a plain caller against the SAME listener
      connects PLAIN: the responder clears the filter per-connection (accepted
      SRTO_PACKETFILTER empty), bytes flow, NOT rejected — proving ONE fec-accept
      listener serves both FEC and non-FEC senders, so no separate FEC port is
      needed. (c) an irreconcilable listener filter config HARD-REJECTS with
      SRT_REJ_FILTER (caller logs ERROR:FILTER, sink accepts nothing, 0 bytes).
      Falsifiable: (a) and (b) share the identical listener yet must report
      opposite filter results. Also records (informational, not gated) that a
      no-filter listener ADOPTS a FEC caller's config (good-deal) rather than
      rejecting — the reject boundary is a config CONFLICT, not the absence of a
      filter. Unprivileged; SKIPs (exit 3) without srt-live-transmit.

  - name: profile-validation-matrix
    script: tests/compat/scenarios/profile-validation-matrix.sh
    tier: blocking
    privileged: true
    notes: >-
      A/B validation matrix: the 4 NON-FEC receive profiles vs the patched-libsrt
      baseline under cross-link reorder stress, judged on srt-sink TS-continuity
      (Task 5), NOT a bytes-only proxy. Drives scenarios/reorder-stress.sh paired/
      alternating (shared per-rep netem seed) and swaps libsrt under srt-sink: the
      profile arm = the reorderfreeze-1.5.5 build (opt-in SRTO_REORDERFREEZE via
      srt-sink --reorderfreeze) plus the recipe flags; the baseline arm = the
      patched CERALIVE/srt build (unconditional BELABOX merge, no flag). Profile
      pairs (each freeze-arm vs its paired baseline at matched latency/bitrate/
      seed): Balanced freeze+NAK @1500ms, Low-Latency freeze+NAK @250ms, Resilient
      freeze+NAK @3500ms, Classic freeze+NAK-off @800ms. EQUAL gate per pair:
      disconnects==0, ts_sync_errors==0, ts_cc_errors<=baseline, median goodput>=
      99% baseline, p95 late-drop<=baseline, wire-amplification<=1.10x baseline.
      Plus a regression-validation cell (Balanced NAK-on vs baseline @{500,1500,
      3500}ms) and a LOSSMAXTTL sweep axis {30,200,1000} to pick the cap. Blocking
      verdict = all 4 non-FEC profiles PASS AND the regression cell PASSes; the
      sweep + a stock-decay control arm are informational/falsifiability. FEC
      scope: the Low-Latency+FEC row is gated separately (fec-connect-matrix).
      Builds the two libsrt via lib/build-libsrt-matrix.sh if absent; evidence
      table -> test-results/srt-receive-profiles/task-6-srt-receive-profiles.json.
      Unprivileged: netem.sh `require` exits 77 (SKIP).

  - name: gain-hunt-matrix
    script: tests/compat/scenarios/gain-hunt-matrix.sh
    tier: informational
    privileged: false
    smoke: tests/compat/scenarios/gain-hunt-matrix.sh --smoke
    notes: >-
      R&D ORCHESTRATOR (non-blocking) for the FEC×NAK×FREEZE gain hunt: the
      campaign that decides whether any receiver recipe earns a place in the
      operator-facing receiver-capability catalog (which ships EMPTY). It fixes the
      pre-registered "real gain + no regression" decision rule in code, enumerates
      the candidate matrix (FEC ALWAYS arq:onreq hybrid; pure FEC arq:never is
      BANNED, REFUSED exit 2 in every mode), and runs as a TWO-STAGE campaign:
      `--stage screen` sweeps all 7 candidates × a reduced adverse grid at low reps
      (=4) and emits the survivors set; `--stage deep` runs the deep set =
      screen-survivors ∪ top-K(2)/family ∪ the high-loss SENTINEL cells
      (STEADY=7,BURST=20 per candidate, ALWAYS) at reps=10, then applies `--analyze`
      (exact Mann-Whitney U + Holm-Bonferroni across EVERY deep cell) and writes
      verdict.json (promoted[...] or NULL). The sentinels are deep-tested even when
      the screen rejected them — the anti-false-NULL rescue (Oracle O4). Each stage
      runs a PORT_MISMATCH falsifiability control FIRST and ABORTS (exit 2) if it
      passes. Modes: bare/`--dry-run`/`--help`/`--stage <s> --plan` exit 0; `--smoke`
      runs the control then ONE bounded cell (needs CAP_NET_ADMIN + srtla-send-rs,
      else SKIP exit 77; control-pass ⇒ SKIP 77); `--claim-gain` REFUSED (exit 3).
      Informational/NON-blocking: it never gates CI and is not executed by
      run-matrix.sh --tier (which runs sender/receiver pairs, not scenarios). Full
      protocol: docs/GAIN-HUNT-PROTOCOL.md. Run: tests/compat/scenarios/gain-hunt-matrix.sh --smoke

excluded:
  - name: moblink-rust
    repo: https://github.com/datagutt/moblink-rust
    reason: "WebSocket-based Moblink relay protocol, not SRTLA — no 0x9200-range constants found in src/; uses JSON serialization and WebSocket transport (src/protocol.rs, src/streamer.rs)"
    studied_at: "dbf44769144f46541e7f47ed29c4b4b037f50cbd"
