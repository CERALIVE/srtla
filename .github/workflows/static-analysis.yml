name: Static Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            cmake \
            pkg-config \
            libspdlog-dev \
            ccache
      
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-clang-tidy-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-clang-tidy-
      
      - name: Configure CMake
        run: |
          cmake -B build -DSRTLA_BUILD_TESTS=OFF -DSRTLA_ENABLE_CLANG_TIDY=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      
      - name: Run clang-tidy
        run: |
          cmake --build build --target lint

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libspdlog-dev \
            ccache
      
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-test-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-test-
      
      - name: Configure CMake
        run: |
          cmake -B build -DSRTLA_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      
      - name: Build
        run: |
          cmake --build build
      
      - name: Run tests
        run: |
          cd build && ctest --output-on-failure
