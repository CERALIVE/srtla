name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - beta
        default: stable

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calver.outputs.version }}
      channel: ${{ steps.calver.outputs.channel }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate CalVer version
        id: calver
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'beta' }}
        run: |
          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%-m")
          IS_BETA=$([[ "$RELEASE_TYPE" == "beta" ]] && echo "true" || echo "false")

          PREFIX="v${YEAR}.${MONTH}"

          if [ "$IS_BETA" == "true" ]; then
            LATEST_BETA=$(git tag -l "${PREFIX}.*-beta.*" | sed -E "s/.*-beta\.([0-9]+)/\1/" | sort -n | tail -1)
            if [ -z "$LATEST_BETA" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((LATEST_BETA + 1))
            fi
            LATEST_STABLE=$(git tag -l "${PREFIX}.*" | grep -v beta | sed "s/${PREFIX}\.//" | sort -n | tail -1)
            PATCH=${LATEST_STABLE:-0}
            NEXT_PATCH=$((PATCH + 1))
            VERSION="${YEAR}.${MONTH}.${NEXT_PATCH}-beta.${BETA_NUM}"
            CHANNEL="beta"
          else
            LATEST_PATCH=$(git tag -l "${PREFIX}.*" | grep -v beta | sed "s/${PREFIX}\.//" | sort -n | tail -1)
            if [ -z "$LATEST_PATCH" ]; then
              PATCH=0
            else
              PATCH=$((LATEST_PATCH + 1))
            fi
            VERSION="${YEAR}.${MONTH}.${PATCH}"
            CHANNEL="stable"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (Channel: ${CHANNEL})"

  build-deb:
    name: Build Debian Package (${{ matrix.arch }})
    needs: calculate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ruby-dev

      - name: Build srtla
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSRTLA_BUILD_TESTS=OFF -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          DESTDIR=$PWD/install cmake --install build

      - name: Install FPM
        run: sudo gem install fpm

      - name: Create packages
        env:
          VERSION: ${{ needs.calculate-version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist

          # Receiver-only package: ships srtla_rec only. The C srtla_send is
          # deprecated and no longer installed (ADR-003); the device sender now
          # comes from the srtla-send-rs package, which carries its own systemd
          # unit. The sender unit is therefore not part of this payload.
          fpm -s dir -t deb \
            -n srtla \
            -v "${VERSION}" \
            -a "${ARCH}" \
            --description "SRTLA - SRT Link Aggregation receiver (srtla_rec)" \
            --maintainer "CERALIVE <contact@ceralive.com>" \
            --url "https://github.com/CERALIVE/srtla" \
            --license "AGPL-3.0" \
            -p "dist/srtla_${VERSION}_${ARCH}.deb" \
            install/usr/=/usr/

          # Create .tar.gz archive
          mkdir -p tarball/srtla-${VERSION}
          cp -r install/usr/* tarball/srtla-${VERSION}/
          cd tarball
          tar -czvf ../dist/srtla_${VERSION}_${ARCH}.tar.gz srtla-${VERSION}
          cd ..

          # Create checksums
          cd dist
          sha256sum srtla_${VERSION}_${ARCH}.deb > srtla_${VERSION}_${ARCH}.deb.sha256
          sha256sum srtla_${VERSION}_${ARCH}.tar.gz > srtla_${VERSION}_${ARCH}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: srtla-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish receiver .deb to R2
    needs: [calculate-version, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare dist directory
        run: |
          mkdir -p dist/arm64 dist/amd64 dist/release
          mv artifacts/srtla-arm64/*.deb dist/arm64/
          mv artifacts/srtla-amd64/*.deb dist/amd64/
          cp artifacts/srtla-arm64/*.tar.gz dist/release/
          cp artifacts/srtla-amd64/*.tar.gz dist/release/
          cp artifacts/srtla-arm64/*.sha256 dist/release/
          cp artifacts/srtla-amd64/*.sha256 dist/release/

      # No per-repo APT metadata here: index ownership is centralized in
      # CERALIVE/apt-worker. This job uploads only the receiver .deb, then fires
      # an `apt-reindex` repository_dispatch (below) so the worker regenerates
      # and signs Packages/Release once per channel — no per-repo reindex race.

      - name: Ensure AWS CLI
        run: |
          # ubuntu-latest ships AWS CLI v2 preinstalled; `aws/install` without
          # --update aborts on a preexisting install. Only fetch when absent.
          if ! command -v aws >/dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi
          aws --version

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CHANNEL: ${{ needs.calculate-version.outputs.channel }}
          # aws-cli >= 2.23 sends CRC32/CRC64NVME integrity checksums on every
          # request by default; Cloudflare R2 does not implement them and rejects
          # the call. Restore the pre-2.23 behavior so the cp uploads succeed.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"

          # Receiver .deb only — apt-worker owns Packages/Release. R2 returns
          # NoSuchKey from ListObjectsV2 for a not-yet-existing prefix, which
          # breaks `aws s3 sync` on the first upload to a channel; `cp --recursive`
          # uploads without diffing, accumulating per-version .debs in the prefix.
          aws s3 cp dist/arm64/ "s3://$R2_BUCKET/dists/$CHANNEL/binary-arm64/" \
            --recursive --endpoint-url "$R2_ENDPOINT"
          aws s3 cp dist/amd64/ "s3://$R2_BUCKET/dists/$CHANNEL/binary-amd64/" \
            --recursive --endpoint-url "$R2_ENDPOINT"

      # Hand off to the central index owner: apt-worker regenerates and signs
      # Packages/Release for this channel after the .deb lands in R2.
      # CERALIVE_DISPATCH_TOKEN is NOT yet an org secret — it must be added: a
      # fine-grained PAT with `contents: write` on CERALIVE/apt-worker so this
      # repo can fire the cross-repo reindex.
      - name: Trigger centralized APT reindex
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CERALIVE_DISPATCH_TOKEN }}
          repository: CERALIVE/apt-worker
          event-type: apt-reindex
          client-payload: >-
            {"component":"srtla","version":"${{ needs.calculate-version.outputs.version }}","channel":"${{ needs.calculate-version.outputs.channel }}"}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.calculate-version.outputs.version }}
          name: srtla v${{ needs.calculate-version.outputs.version }}
          prerelease: ${{ needs.calculate-version.outputs.channel == 'beta' }}
          files: |
            dist/arm64/*.deb
            dist/amd64/*.deb
            dist/release/*.tar.gz
            dist/release/*.sha256
          body: |
            ## srtla v${{ needs.calculate-version.outputs.version }}

            SRTLA (SRT Link Aggregation) - Bond multiple network connections for reliable streaming.

            ### Dependency Chain
            ```
            srt
              └── srtla (this package)
                    │
                    └── Used by: cerastream → ceralive-device
            ```

            ### Debian Packages
            | Architecture | Package |
            |--------------|---------|
            | ARM64 | `srtla_${{ needs.calculate-version.outputs.version }}_arm64.deb` |
            | AMD64 | `srtla_${{ needs.calculate-version.outputs.version }}_amd64.deb` |

            ### Binary Archives
            | Architecture | Archive |
            |--------------|---------|
            | ARM64 | `srtla_${{ needs.calculate-version.outputs.version }}_arm64.tar.gz` |
            | AMD64 | `srtla_${{ needs.calculate-version.outputs.version }}_amd64.tar.gz` |

            ### Installation

            **Debian/Ubuntu:**
            ```bash
            sudo dpkg -i srtla_${{ needs.calculate-version.outputs.version }}_<arch>.deb
            ```

            **Manual:**
            ```bash
            tar -xzf srtla_${{ needs.calculate-version.outputs.version }}_<arch>.tar.gz
            sudo cp -r srtla-${{ needs.calculate-version.outputs.version }}/* /usr/
            ```
