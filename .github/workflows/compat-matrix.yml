name: Compatibility Matrix

# Cross-implementation SRTLA interop, driven by tests/compat/matrix.yaml
# (the single source of truth) via tests/compat/gen-ci-matrix.sh.
#
#   * blocking tier  -> gates merges (a failing blocking pair fails this run)
#   * informational  -> gates merges on PRs (pins are fixed, so a failure is a
#                        real regression rather than upstream drift)
#   * weekly drift    -> re-runs the informational tier against upstream HEADs,
#                        purely to surface upstream divergence; never blocks
#
# Each tier fans out one job per pair (strategy.matrix from generate-matrix), so
# the independent pairs run in parallel rather than as one long sequential job.
# Per-tier gate jobs ("Blocking tier" / "Informational tier") aggregate the legs
# back into a single, stable merge-gating status check.
#
# amd64 only — bonded UDP interop is exercised on a single ubuntu-latest host.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "tests/compat/**"
      - ".github/workflows/compat-matrix.yml"
      - ".github/actions/compat-build/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "tests/compat/**"
      - ".github/workflows/compat-matrix.yml"
      - ".github/actions/compat-build/**"
  schedule:
    # Mondays 06:00 UTC — weekly upstream-drift detection.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: compat-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------- #
  # Derive the GitHub Actions matrix from matrix.yaml. Nothing downstream  #
  # hardcodes a pair list; everything flows from this job's outputs.       #
  # --------------------------------------------------------------------- #
  generate-matrix:
    name: Generate matrix from matrix.yaml
    runs-on: ubuntu-latest
    outputs:
      blocking: ${{ steps.gen.outputs.blocking }}
      informational: ${{ steps.gen.outputs.informational }}
      has_informational: ${{ steps.gen.outputs.has_informational }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install PyYAML
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq python3-yaml

      - name: Generate matrix
        id: gen
        run: |
          blocking="$(tests/compat/gen-ci-matrix.sh --tier blocking)"
          informational="$(tests/compat/gen-ci-matrix.sh --tier informational)"
          {
            echo "blocking=$blocking"
            echo "informational=$informational"
          } >> "$GITHUB_OUTPUT"
          info_count="$(printf '%s' "$informational" | jq '.include | length')"
          if [ "$info_count" -gt 0 ]; then
            echo "has_informational=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_informational=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          BLOCKING: ${{ steps.gen.outputs.blocking }}
          INFORMATIONAL: ${{ steps.gen.outputs.informational }}
        run: |
          {
            echo "## Compatibility matrix (from tests/compat/matrix.yaml)"
            echo ""
            echo "| tier | sender | receiver |"
            echo "|------|--------|----------|"
            printf '%s' "$BLOCKING" \
              | jq -r '.include[] | "| blocking | \(.sender) | \(.receiver) |"'
            printf '%s' "$INFORMATIONAL" \
              | jq -r '.include[] | "| informational | \(.sender) | \(.receiver) |"'
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------- #
  # Blocking tier — one job per pair, fanned out from matrix.yaml so the   #
  # independent pairs run in parallel instead of one sequential job.       #
  # fail-fast: false keeps every pair reporting; the compat-blocking-gate  #
  # job below folds the legs into the single merge-gating status.          #
  # --------------------------------------------------------------------- #
  compat-blocking:
    name: "blocking: ${{ matrix.sender }} -> ${{ matrix.receiver }}"
    needs: generate-matrix
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.blocking) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Restore external image cache
        uses: actions/cache@v5
        with:
          path: /tmp/compat-images
          key: compat-images-blocking-${{ hashFiles('tests/compat/matrix.yaml', 'tests/compat/docker/**') }}

      - name: Build helpers and external images
        uses: ./.github/actions/compat-build
        with:
          tier: blocking

      - name: Run compatibility pair
        run: >-
          tests/compat/run-matrix.sh
          --sender "${{ matrix.sender }}"
          --receiver "${{ matrix.receiver }}"
          --duration 20

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compat-results-blocking-${{ matrix.sender }}-x-${{ matrix.receiver }}
          path: tests/compat/results/**/result.json
          if-no-files-found: ignore

  # --------------------------------------------------------------------- #
  # Blocking gate — one stable status that fails if any blocking leg       #
  # failed, so "a failing blocking pair fails this run" holds under one    #
  # check name no matter how many pairs the matrix fans into.             #
  # --------------------------------------------------------------------- #
  compat-blocking-gate:
    name: Blocking tier
    needs: compat-blocking
    if: always() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Require all blocking pairs to pass
        env:
          RESULT: ${{ needs.compat-blocking.result }}
        run: |
          echo "blocking matrix result: $RESULT"
          [ "$RESULT" = "success" ] || {
            echo "::error title=Blocking tier::one or more blocking compat pairs failed ($RESULT)"
            exit 1
          }

  # --------------------------------------------------------------------- #
  # Informational tier — same per-pair fan-out (pinned SHAs; a failure is  #
  # a regression). Only materializes when matrix.yaml has informational    #
  # pairs (has_informational guard).                                       #
  # --------------------------------------------------------------------- #
  compat-informational:
    name: "informational: ${{ matrix.sender }} -> ${{ matrix.receiver }}"
    needs: generate-matrix
    if: github.event_name != 'schedule' && needs.generate-matrix.outputs.has_informational == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.informational) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Restore external image cache
        uses: actions/cache@v5
        with:
          path: /tmp/compat-images
          key: compat-images-informational-${{ hashFiles('tests/compat/matrix.yaml', 'tests/compat/docker/**') }}

      - name: Build helpers and external images
        uses: ./.github/actions/compat-build
        with:
          tier: informational

      - name: Run compatibility pair
        run: >-
          tests/compat/run-matrix.sh
          --sender "${{ matrix.sender }}"
          --receiver "${{ matrix.receiver }}"
          --duration 20

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compat-results-informational-${{ matrix.sender }}-x-${{ matrix.receiver }}
          path: tests/compat/results/**/result.json
          if-no-files-found: ignore

  # --------------------------------------------------------------------- #
  # Informational gate — stable status mirroring the blocking gate; passes #
  # vacuously when no informational pairs are registered.                  #
  # --------------------------------------------------------------------- #
  compat-informational-gate:
    name: Informational tier
    needs: [generate-matrix, compat-informational]
    if: always() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Require all informational pairs to pass
        env:
          RESULT: ${{ needs.compat-informational.result }}
          HAS_INFO: ${{ needs.generate-matrix.outputs.has_informational }}
        run: |
          echo "informational matrix result: $RESULT (has_informational=$HAS_INFO)"
          if [ "$HAS_INFO" != "true" ]; then
            echo "No informational pairs registered; nothing to gate."
            exit 0
          fi
          [ "$RESULT" = "success" ] || {
            echo "::error title=Informational tier::one or more informational compat pairs failed ($RESULT)"
            exit 1
          }

  # --------------------------------------------------------------------- #
  # pcap replay — runs only when an LFS fixture is present. Missing        #
  # fixture (or replay tool not yet wired) is a graceful skip, mirroring   #
  # the replay tool's own exit-77 SKIP semantics.                          #
  # --------------------------------------------------------------------- #
  pcap-replay:
    name: pcap replay
    needs: generate-matrix
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive
          lfs: true

      - name: Replay pcap fixtures (skip if absent)
        run: |
          shopt -s nullglob
          fixtures=(tests/compat/fixtures/*.pcap tests/compat/fixtures/*.pcapng)

          if [ "${#fixtures[@]}" -eq 0 ]; then
            echo "::notice title=pcap replay::No LFS pcap fixture present; skipping (replay.sh exit-77 SKIP semantics)."
            echo "pcap replay: SKIPPED (no fixture)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Fixture present: build srtla_rec (replay.py is stdlib-only) and replay.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config libspdlog-dev
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)" --target srtla_rec

          set +e
          tests/compat/pcap-replay/replay.sh
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "::notice title=pcap replay::Replay reported SKIP (exit 77)."
            echo "pcap replay: SKIPPED (exit 77)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          exit "$rc"

  # --------------------------------------------------------------------- #
  # Weekly upstream drift — informational tier against upstream HEADs.     #
  # Pure detection: never blocks.                                          #
  # --------------------------------------------------------------------- #
  upstream-drift:
    name: Weekly upstream drift
    needs: generate-matrix
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build helpers and external images at upstream HEAD
        uses: ./.github/actions/compat-build
        with:
          tier: informational
          drift: "true"

      - name: Run informational tier against upstream HEADs
        run: |
          echo "Weekly drift run: informational tier built against upstream HEAD." \
            >> "$GITHUB_STEP_SUMMARY"
          tests/compat/run-matrix.sh --tier informational --duration 20

      - name: Upload drift results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compat-results-drift
          path: tests/compat/results/**/result.json
          if-no-files-found: ignore
