name: TypeScript Bindings

on:
  push:
    branches: [main]
    paths:
      - "bindings/typescript/**"
      - ".github/workflows/bindings.yml"
  pull_request:
    branches: [main]
    paths:
      - "bindings/typescript/**"
      - ".github/workflows/bindings.yml"

permissions:
  contents: read

concurrency:
  group: bindings-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Summary
        if: success()
        run: |
          {
            echo "## TypeScript bindings green"
            echo ""
            echo "- Type-check: bun run lint"
            echo "- Build: bun run build"
            echo "- Tests: bun test"
          } >> "$GITHUB_STEP_SUMMARY"
