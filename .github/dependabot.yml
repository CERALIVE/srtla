version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/bindings/typescript"
    schedule:
      interval: "weekly"
    groups:
      npm-bindings:
        patterns: ["*"]
